<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verso — paste code, edit visually, get code back</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#16131d; --chrome:#1e1a28; --chrome-2:#272135; --line:#352d47;
    --ink:#efeaf6; --ink-mute:#9b8fb3; --ink-faint:#6d6285;
    --coral:#ff6b5d; --coral-dim:#ff6b5d40; --mint:#5fd7b4; --artboard:#f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--ink); font-family:"Sora",system-ui,sans-serif;
         -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; overflow:hidden; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--chrome);
            border-bottom:1px solid var(--line); flex:0 0 auto; flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:9px; }
  .brand .logo { display:block; flex:0 0 auto; }
  .brand .name { font-weight:700; font-size:18px; letter-spacing:-.01em; }
  .brand .name b { color:var(--coral); }
  .brand .sub { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.06em;
                color:var(--ink-faint); text-transform:uppercase; }
  .topbar .spacer { flex:1; }
  .group { display:flex; align-items:center; gap:4px; background:var(--chrome-2);
           border:1px solid var(--line); border-radius:8px; padding:3px; }
  .zlabel { font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--ink-mute); min-width:42px; text-align:center; }
  .btn { font-family:"Sora",sans-serif; font-size:13px; font-weight:500; color:var(--ink);
         background:var(--chrome-2); border:1px solid var(--line); border-radius:7px;
         padding:7px 12px; cursor:pointer; white-space:nowrap; }
  .btn:hover { border-color:var(--ink-faint); }
  .btn.primary { background:var(--coral); color:#1a0f0d; border-color:var(--coral); font-weight:600; }
  .btn.ghost { background:transparent; }
  .btn.danger { color:var(--coral); border-color:var(--coral-dim); }
  .btn.icon { padding:6px 9px; font-family:"JetBrains Mono",monospace; line-height:1; }
  .btn:disabled { opacity:.38; cursor:default; }
  .btn.sm { padding:5px 9px; font-size:12px; }
  .btn:focus-visible { outline:2px solid var(--mint); outline-offset:2px; }

  .work { flex:1; display:grid; grid-template-columns:1fr 392px; min-height:0; }
  .work.collapsed { grid-template-columns:1fr 0; }
  .work.collapsed .side { display:none; }
  @media (max-width:860px){ .work{ grid-template-columns:1fr; grid-template-rows:1fr 48vh; }
                            .work.collapsed{ grid-template-rows:1fr 0; } }

  .canvas-wrap { position:relative; overflow:auto; padding:26px;
    background:radial-gradient(circle at 1px 1px, rgba(255,255,255,.05) 1px, transparent 0) 0 0/22px 22px, #100d16; }
  .canvas-wrap.drop { outline:2px dashed var(--mint); outline-offset:-10px; }
  .zoom-frame { position:relative; }
  iframe#stage { position:absolute; top:0; left:0; border:0; background:var(--artboard);
                 border-radius:6px; box-shadow:0 18px 50px -20px rgba(0,0,0,.7); transform-origin:0 0; }
  #overlay { position:absolute; pointer-events:none; border:1.5px solid var(--coral);
             box-shadow:0 0 0 1px rgba(0,0,0,.25); display:none; z-index:30; }
  #overlay .tag { position:absolute; top:-20px; left:-1.5px; background:var(--coral); color:#1a0f0d;
    font-family:"JetBrains Mono",monospace; font-size:10px; padding:1px 6px; border-radius:4px 4px 0 0; white-space:nowrap; }
  #overlay .grip { position:absolute; right:-7px; bottom:-7px; width:14px; height:14px; border-radius:3px;
    background:var(--coral); border:2px solid var(--artboard); pointer-events:auto; cursor:nwse-resize; }
  #overlay .rot { position:absolute; top:-32px; left:50%; margin-left:-8px; width:16px; height:16px; border-radius:50%;
    background:var(--mint); border:2px solid var(--artboard); pointer-events:auto; cursor:grab; }
  #overlay .rot::after { content:""; position:absolute; left:50%; top:14px; width:1.5px; height:18px;
    background:var(--mint); margin-left:-.75px; }
  #emptyState { position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; padding:24px; text-align:center; pointer-events:none; }
  .canvas-wrap.empty #emptyState { display:flex; }
  #emptyState img { width:min(560px,82%); border-radius:14px; box-shadow:0 22px 64px -26px rgba(0,0,0,.85); }
  #emptyState p { margin:0; color:var(--ink-faint); font-size:14px; }
  #showPanel { position:absolute; top:14px; right:14px; z-index:40; display:none; }
  .work.collapsed #showPanel { display:block; }

  .side { background:var(--chrome); border-left:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  @media (max-width:860px){ .side{ border-left:0; border-top:1px solid var(--line); } }
  .section { border-bottom:1px solid var(--line); }
  .section.scroll { overflow:auto; }
  .sec-head { display:flex; align-items:center; gap:8px; padding:11px 16px; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--chrome); z-index:2; }
  .sec-head h2 { margin:0; font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:600;
                 letter-spacing:.14em; text-transform:uppercase; color:var(--ink-mute); flex:1; }
  .sec-head .chev { color:var(--ink-faint); font-size:11px; transition:transform .15s; }
  .section.closed .chev { transform:rotate(-90deg); }
  .section.closed .sec-body { display:none; }
  .sec-body { padding:0 16px 16px; }

  .crumbs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
  .crumbs button { font-family:"JetBrains Mono",monospace; font-size:10.5px; background:var(--chrome-2);
    color:var(--ink-mute); border:1px solid var(--line); border-radius:5px; padding:2px 6px; cursor:pointer; }
  .crumbs button.cur { color:var(--coral); border-color:var(--coral); }
  .insp-empty { color:var(--ink-faint); font-size:13px; }

  .grp { padding:12px 0; border-top:1px solid var(--line); }
  .grp:first-of-type { border-top:0; padding-top:4px; }
  .grp-t { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px; }
  .ctl { margin-bottom:10px; } .ctl:last-child { margin-bottom:0; }
  .ctl > label { display:block; font-size:11px; color:var(--ink-mute); margin-bottom:5px; }
  .swatches { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .swatch { display:flex; flex-direction:column; gap:5px; align-items:center; background:var(--chrome-2);
            border:1px solid var(--line); border-radius:7px; padding:7px 6px; }
  .swatch span { font-size:10px; color:var(--ink-mute); }
  .swatch input[type=color] { width:100%; height:24px; border:0; background:none; border-radius:5px; cursor:pointer; padding:0; }
  .rowctl { display:flex; gap:8px; align-items:flex-end; } .rowctl .field { flex:1; min-width:0; }
  .num, select.sel { width:100%; background:var(--chrome-2); color:var(--ink); border:1px solid var(--line);
         border-radius:6px; padding:7px 8px; font-family:"JetBrains Mono",monospace; font-size:12.5px; }
  select.sel { font-family:"Sora",sans-serif; cursor:pointer; }
  .num:focus-visible, select.sel:focus-visible { outline:2px solid var(--mint); }
  .lock { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-mute); padding-bottom:7px; white-space:nowrap; }
  .seg { display:flex; gap:4px; }
  .seg button { flex:1; background:var(--chrome-2); border:1px solid var(--line); color:var(--ink-mute);
    border-radius:6px; padding:6px 0; cursor:pointer; font-size:13px; }
  .seg button.on { color:var(--coral); border-color:var(--coral); }
  .slider-row { display:flex; gap:10px; align-items:center; }
  input[type=range]{ -webkit-appearance:none; appearance:none; flex:1; height:3px; border-radius:2px; background:var(--line); }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
    background:var(--coral); border:3px solid var(--chrome); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:13px; height:13px; border-radius:50%; background:var(--coral); border:3px solid var(--chrome); cursor:pointer; }
  .insp-actions { display:flex; gap:8px; margin-top:10px; }

  .asset-add { display:flex; gap:8px; margin-bottom:12px; }
  .asset-add .num { flex:1; }
  .assets-list { display:flex; flex-direction:column; gap:7px; }
  .asset { display:grid; grid-template-columns:34px 1fr auto auto; gap:9px; align-items:center;
           background:var(--chrome-2); border:1px solid var(--line); border-radius:8px; padding:7px 8px; }
  .asset .thumb { width:34px; height:34px; border-radius:5px; background:#0e0b14; display:grid; place-items:center;
                  font-size:14px; color:var(--ink-faint); overflow:hidden; }
  .asset .thumb img { width:100%; height:100%; object-fit:cover; }
  .asset .aname { width:100%; background:transparent; color:var(--ink); border:0; border-bottom:1px solid transparent;
                  font-family:"JetBrains Mono",monospace; font-size:12px; padding:2px 0; }
  .asset .aname:focus { outline:0; border-bottom-color:var(--mint); }
  .asset .rm { color:var(--ink-faint); background:none; border:0; cursor:pointer; font-size:15px; padding:0 4px; }
  .asset .rm:hover { color:var(--coral); }
  .assets-empty { color:var(--ink-faint); font-size:12.5px; }

  .codepane { flex:1; display:flex; flex-direction:column; min-height:120px; }
  .codepane .ch { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line);
    font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--ink-mute); }
  .codepane .ch .spacer { flex:1; }
  textarea#code { flex:1; resize:none; border:0; outline:0; background:#110e17; color:#d9d2e6;
    font-family:"JetBrains Mono",monospace; font-size:12.5px; line-height:1.6; padding:14px 16px; tab-size:2; }
  .hint { font-size:11px; color:var(--ink-faint); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <svg class="logo" width="26" height="26" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M48 88C48 65.9 65.9 48 88 48H164" stroke="#6D6285" stroke-width="14" stroke-linecap="round"/>
        <path d="M48 88V168C48 190.1 65.9 208 88 208H120" stroke="#6D6285" stroke-width="14" stroke-linecap="round"/>
        <path d="M176 48H208V80" stroke="#5FD7B4" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M200 92V188" stroke="#5FD7B4" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 12"/>
        <path d="M80 200H188" stroke="#5FD7B4" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 12"/>
        <rect x="184" y="184" width="24" height="24" fill="#FF6B5D" rx="3"/>
        <path d="M88 86L128 174L168 86" stroke="#FF6B5D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="name">Ver<b>so</b></span><span class="sub">visual&nbsp;↔&nbsp;code</span>
    </div>
    <div class="spacer"></div>
    <div class="group" role="group" aria-label="History">
      <button class="btn icon" id="undoBtn" title="Undo (Ctrl+Z)" disabled>↶</button>
      <button class="btn icon" id="redoBtn" title="Redo (Ctrl+Shift+Z)" disabled>↷</button>
    </div>
    <div class="group" role="group" aria-label="Zoom">
      <button class="btn icon" id="zoomOut" title="Zoom out">−</button>
      <span class="zlabel" id="zoomLabel">100%</span>
      <button class="btn icon" id="zoomIn" title="Zoom in">+</button>
      <button class="btn icon" id="zoomFit" title="Fit width">⤢</button>
    </div>
    <input type="file" id="fileInput" accept=".html,.htm,text/html" hidden />
    <button class="btn ghost" id="openBtn">Open file</button>
    <button class="btn ghost" id="exampleBtn">Example</button>
    <button class="btn primary" id="downloadBtn">Download</button>
    <button class="btn icon" id="togglePanel" title="Hide panel">⇥</button>
  </div>

  <div class="work" id="work">
    <div class="canvas-wrap empty" id="canvasWrap">
      <button class="btn icon" id="showPanel" title="Show panel">⇤</button>

                <div class="field"><label>Padding (px)</label><input class="num" type="number" id="pad" min="0" max="200" step="1" /></div>
                <div class="field"><label>Margin (px)</label><input class="num" type="number" id="mar" min="0" max="200" step="1" /></div>
              </div>
            </div>

            <div class="grp">
              <div class="grp-t">Transform</div>
              <div class="ctl rowctl">
                <div class="field"><label>Width (px)</label><input class="num" type="number" id="elW" min="0" step="1" /></div>
                <div class="field"><label>Height (px)</label><input class="num" type="number" id="elH" min="0" step="1" /></div>
                <label class="lock"><input type="checkbox" id="lockAspect" checked /> lock</label>
              </div>
              <div class="ctl"><label>Rotate (°)</label>
                <div class="slider-row">
                  <input type="range" id="rotRange" min="-180" max="180" step="1" value="0" />
                  <input class="num" type="number" id="rotNum" min="-180" max="180" step="1" style="width:68px" />
                </div>
              </div>
              <div class="ctl rowctl">
                <div class="field"><label>Move X</label><input class="num" type="number" id="posX" step="1" /></div>
                <div class="field"><label>Move Y</label><input class="num" type="number" id="posY" step="1" /></div>
              </div>
            </div>

            <div class="insp-actions">
              <button class="btn ghost sm" id="resetTfBtn">Reset transform</button>
              <button class="btn danger sm" id="deleteBtn">Delete</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ASSETS -->
      <div class="section" id="secAssets">
        <div class="sec-head"><h2>Assets</h2><span class="chev">▾</span></div>
        <div class="sec-body">
          <div class="asset-add">
            <input class="num" id="assetName" placeholder="hero.mp4 / foto.jpg" />
            <button class="btn ghost sm" id="assetAddBtn">Add</button>
            <button class="btn ghost sm" id="assetUploadBtn" title="Upload">⤓</button>
            <input type="file" id="assetFile" accept="image/*,video/*" multiple hidden />
          </div>
          <div class="assets-list" id="assetsList"></div>
        </div>
      </div>

      <!-- CODE -->
      <div class="codepane">
        <div class="ch"><span>Code</span><span class="spacer"></span>
          <span class="hint">edit &amp; press Apply →</span>
          <button class="btn primary sm" id="applyBtn">Apply</button>
        </div>
        <textarea id="code" spellcheck="false" placeholder="Drop / open an HTML file, or load the Example…"></textarea>
      </div>
    </div>
  </div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
const stage=$("#stage"), wrap=$("#canvasWrap"), zoomFrame=$("#zoomFrame"),
      overlay=$("#overlay"), codeEl=$("#code"), work=$("#work");

let doc=null, isFullDoc=false, selected=null, uidSeq=0;
let zoom=1, baseW=800, currentFileName="edited.html", pendingLoad=null;
const assets=[];
let history=[], histIndex=-1;

const VOID=new Set(["area","base","br","col","embed","hr","img","input","link","meta","param","source","track","wbr"]);
const VERBATIM=new Set(["script","style","pre","textarea"]);
const VIDEO_EXT=/\.(mp4|webm|ogg|mov|m4v)$/i;
const HTML_EXT=/\.html?$/i;

/* ------------------------------------------------------------ load / files */
function loadCode(src){
  src=(src||"").trim();
  if(!src){ wrap.classList.add("empty"); return; }
  isFullDoc=/<html[\s>]/i.test(src);
  const full=isFullDoc?src:
    `<!DOCTYPE html><html><head><meta charset="utf-8">
     <style>body{margin:16px;font-family:system-ui,sans-serif;color:#111}</style></head><body>${src}</body></html>`;
  stage.onload=onStageLoad; stage.srcdoc=full;
}
function onStageLoad(){
  doc=stage.contentDocument; if(!doc) return;
  instrument(); rewireAssets(); fitHeight(); applyZoom(); wireStageEvents();
  deselect(); syncCode(); wrap.classList.remove("empty"); resetHistory();
  if(pendingLoad){ const cb=pendingLoad; pendingLoad=null; cb(); }
}
function ensureDoc(cb){
  if(doc){ cb(); return; }
  currentFileName="untitled.html"; pendingLoad=cb;
  loadCode(`<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8">
    <style>body{margin:24px;font-family:system-ui,sans-serif;background:#f3f4f6;color:#1f2430}</style></head>
    <body></body></html>`);
}
function instrument(){
  uidSeq=0;
  doc.querySelectorAll("*").forEach((el)=>{
    const t=el.tagName.toLowerCase();
    if(["html","head","meta","title","base","link","script","style"].includes(t)) return;
    el.setAttribute("data-ve-uid", String(++uidSeq));
  });
}
function fitHeight(){
  try{ const h=Math.max(doc.documentElement.scrollHeight, doc.body?doc.body.scrollHeight:0, 200);
       stage.style.height=h+"px"; }catch(_){}
}

$("#openBtn").onclick=()=>$("#fileInput").click();
$("#fileInput").onchange=(e)=>{ const f=e.target.files[0]; if(f) readHtmlFile(f); e.target.value=""; };
function readHtmlFile(f){
  currentFileName=f.name.replace(HTML_EXT,"")+".html";
  const r=new FileReader();
  r.onload=()=>{ codeEl.value=r.result; loadCode(r.result); };
  r.readAsText(f);
}
$("#downloadBtn").onclick=()=>{
  const blob=new Blob([codeEl.value],{type:"text/html"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=currentFileName;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
};

/* ------------------------------------------------------------ zoom / panel */
const clampZoom=(z)=>Math.min(2, Math.max(0.25, z));
function applyZoom(){
  stage.style.transformOrigin="0 0";
  stage.style.transform=`scale(${zoom})`;
  stage.style.width=baseW+"px";
  const h=parseFloat(stage.style.height)||300;
  zoomFrame.style.width=(baseW*zoom)+"px";
  zoomFrame.style.height=(h*zoom)+"px";
  $("#zoomLabel").textContent=Math.round(zoom*100)+"%";
  positionOverlay();
}
const setZoom=(z)=>{ zoom=clampZoom(z); applyZoom(); };
$("#zoomIn").onclick =()=>setZoom(zoom+0.1);
$("#zoomOut").onclick=()=>setZoom(zoom-0.1);
$("#zoomFit").onclick=()=>{ baseW=Math.max(320, wrap.clientWidth-52); zoom=1; applyZoom(); };
$("#togglePanel").onclick=()=>{ work.classList.add("collapsed"); refitWidth(); };
$("#showPanel").onclick  =()=>{ work.classList.remove("collapsed"); refitWidth(); };
function refitWidth(){ requestAnimationFrame(()=>{ baseW=Math.max(320, wrap.clientWidth-52); applyZoom(); }); }

/* ------------------------------------------------------------ drag & drop */
["dragenter","dragover"].forEach(ev=>wrap.addEventListener(ev,(e)=>{ e.preventDefault(); wrap.classList.add("drop"); }));
["dragleave","drop"].forEach(ev=>wrap.addEventListener(ev,(e)=>{ if(ev==="dragleave" && e.target!==wrap) return; wrap.classList.remove("drop"); }));
wrap.addEventListener("drop",(e)=>{
  e.preventDefault(); wrap.classList.remove("drop");
  const files=[...(e.dataTransfer?e.dataTransfer.files:[])]; if(!files.length) return;
  const html=files.find(f=>HTML_EXT.test(f.name)||f.type==="text/html");
  if(html){ readHtmlFile(html); return; }
  const media=files.filter(f=>f.type.startsWith("image")||f.type.startsWith("video"));
  if(!media.length) return;
  const drop={x:e.clientX, y:e.clientY};
  ensureDoc(()=>media.forEach(f=>dropMedia(f, drop)));
});
function dropMedia(file, pt){
  const a=addAssetSlot(file.name, file);
  const r=stage.getBoundingClientRect();
  const ix=(pt.x-r.left)/zoom, iy=(pt.y-r.top)/zoom;
  let target=null; try{ target=doc.elementFromPoint(ix,iy); }catch(_){}
  if(target && target.tagName && target.tagName.toLowerCase()==="img" && a.kind==="image"){
    target.setAttribute("data-ve-src", a.name); target.src=a.url;
    if(!target.hasAttribute("data-ve-uid")) target.setAttribute("data-ve-uid",String(++uidSeq));
    fitHeight(); applyZoom(); select(target); commit(); return;
  }
  const container=(target && target.closest)? target.closest("[data-ve-uid]") : null;
  insertAsset(a, container && !VOID.has(container.tagName.toLowerCase()) ? container : null);
}

/* ------------------------------------------------------------ stage events */
function wireStageEvents(){
  doc.addEventListener("click",(e)=>{
    if(dragMoved){ dragMoved=false; return; }
    const el=e.target;
    if(!el || el===doc.documentElement || el===doc.body){ deselect(); return; }
    e.preventDefault(); select(el);
  }, true);
  doc.addEventListener("dblclick",(e)=>{
    const el=e.target; if(!el||!el.hasAttribute||!el.hasAttribute("data-ve-uid")) return;
    el.setAttribute("contenteditable","true"); el.focus(); select(el);
    const stop=()=>{ el.removeAttribute("contenteditable"); commit(); el.removeEventListener("blur",stop); };
    el.addEventListener("blur",stop);
  });
  doc.addEventListener("input",()=>{ fitHeight(); applyZoom(); syncCode(); });
  doc.addEventListener("pointerdown", startMove, true);
  stage.contentWindow.addEventListener("scroll", positionOverlay);
}

/* ------------------------------------------------------------ selection */
function select(el){
  selected=el; positionOverlay(); overlay.style.display="block";
  overlay.querySelector(".tag").textContent=describe(el);
  buildCrumbs(el); fillInspector(el);
  $("#inspEmpty").style.display="none"; $("#inspBody").style.display="block";
  $("#secInspector").classList.remove("closed");
}
function deselect(){
  selected=null; overlay.style.display="none"; $("#crumbs").innerHTML="";
  $("#inspEmpty").style.display="block"; $("#inspBody").style.display="none";
}
function describe(el){
  let s=el.tagName.toLowerCase();
  if(el.id) s+="#"+el.id;
  else if(el.className && typeof el.className==="string") s+="."+el.className.trim().split(/\s+/).slice(0,2).join(".");
  return s;
}
function positionOverlay(){
  if(!selected) return;
  const r=selected.getBoundingClientRect();
  overlay.style.left=(r.left*zoom)+"px"; overlay.style.top=(r.top*zoom)+"px";
  overlay.style.width=(r.width*zoom)+"px"; overlay.style.height=(r.height*zoom)+"px";
}
function buildCrumbs(el){
  const chain=[]; let n=el;
  while(n && n.hasAttribute && n.hasAttribute("data-ve-uid")){ chain.unshift(n); n=n.parentElement; }
  const c=$("#crumbs"); c.innerHTML="";
  chain.slice(-4).forEach((node)=>{
    const b=document.createElement("button"); b.textContent=describe(node);
    if(node===el) b.classList.add("cur"); b.onclick=()=>select(node); c.appendChild(b);
  });
}

/* ------------------------------------------------------------ transforms */
function getTransform(el){
  const t=el.style.transform||"";
  const tr=/translate\(\s*(-?[\d.]+)px\s*,\s*(-?[\d.]+)px\s*\)/.exec(t);
  const ro=/rotate\(\s*(-?[\d.]+)deg\s*\)/.exec(t);
  return { tx: tr?+tr[1]:0, ty: tr?+tr[2]:0, rot: ro?+ro[1]:0 };
}
function setTransform(el,tf){
  const p=[];
  if(tf.tx||tf.ty) p.push(`translate(${Math.round(tf.tx)}px, ${Math.round(tf.ty)}px)`);
  if(tf.rot) p.push(`rotate(${tf.rot}deg)`);
  if(p.length) el.style.transform=p.join(" "); else el.style.removeProperty("transform");
}

/* ------------------------------------------------------------ inspector */
function rgbToHex(rgb){
  const m=(rgb||"").match(/\d+/g); if(!m) return "#000000";
  return "#"+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,"0")).join("");
}
function cstyle(el){ return el.ownerDocument.defaultView.getComputedStyle(el); }
function applyStyle(fn){ if(!selected) return; fn(selected); positionOverlay(); fitHeight(); applyZoom(); syncCode(); }
function styleCtl(id, prop, unit){
  const c=$("#"+id);
  c.oninput=()=>applyStyle(t=>{ t.style[prop] = (c.value===""||c.value==null) ? "" : (c.value + (unit||"")); });
}

function fillInspector(el){
  const cs=cstyle(el), r=el.getBoundingClientRect();
  $("#cText").value=rgbToHex(cs.color);
  $("#cBg").value=rgbToHex(cs.backgroundColor);
  $("#cBorder").value=rgbToHex(cs.borderTopColor);
  $("#fSize").value=Math.round(parseFloat(cs.fontSize))||"";
  $("#fFamily").value=[...$("#fFamily").options].some(o=>o.value===el.style.fontFamily)?el.style.fontFamily:"";
  const w=String(Math.round(parseFloat(cs.fontWeight))||"");
  $("#fWeight").value=[...$("#fWeight").options].some(o=>o.value===w)?w:"";
  $("#lh").value=el.style.lineHeight?parseFloat(el.style.lineHeight)||"":"";
  $("#ls").value=parseFloat(cs.letterSpacing)||0;
  $("#bWidth").value=Math.round(parseFloat(cs.borderTopWidth))||0;
  $("#bStyle").value=[...$("#bStyle").options].some(o=>o.value===cs.borderTopStyle)?cs.borderTopStyle:"";
  $("#radius").value=Math.round(parseFloat(cs.borderTopLeftRadius))||0;
  $("#opacity").value=Math.round((parseFloat(cs.opacity)||1)*100);
  $("#pad").value=Math.round(parseFloat(cs.paddingTop))||0;
  $("#mar").value=Math.round(parseFloat(cs.marginTop))||0;
  $("#elW").value=Math.round(r.width); $("#elH").value=Math.round(r.height);
  const tf=getTransform(el);
  $("#rotRange").value=tf.rot; $("#rotNum").value=tf.rot;
  $("#posX").value=tf.tx; $("#posY").value=tf.ty;
  // toggle states
  const al=cs.textAlign==="start"?"left":cs.textAlign;
  document.querySelectorAll("#alignSeg [data-a]").forEach(b=>b.classList.toggle("on", b.dataset.a===al));
  $("#italicBtn").classList.toggle("on", cs.fontStyle==="italic");
}

function bindInspector(){
  styleCtl("fFamily","fontFamily");
  styleCtl("fSize","fontSize","px");
  styleCtl("fWeight","fontWeight");
  styleCtl("lh","lineHeight");
  styleCtl("ls","letterSpacing","px");
  styleCtl("radius","borderRadius","px");
  styleCtl("pad","padding","px");
  styleCtl("mar","margin","px");
  styleCtl("bStyle","borderStyle");
  $("#cText").oninput  =(e)=>applyStyle(t=>t.style.color=e.target.value);
  $("#cBg").oninput    =(e)=>applyStyle(t=>t.style.backgroundColor=e.target.value);
  $("#cBorder").oninput=(e)=>applyStyle(t=>{ t.style.borderColor=e.target.value;
    if(!parseFloat(cstyle(t).borderTopWidth)){ t.style.borderWidth="1px"; t.style.borderStyle="solid"; $("#bWidth").value=1; $("#bStyle").value="solid"; } });
  $("#bWidth").oninput =(e)=>applyStyle(t=>{ const w=+e.target.value||0; t.style.borderWidth=w+"px";
    if(w>0){ if(!t.style.borderStyle||t.style.borderStyle==="none"){ t.style.borderStyle="solid"; $("#bStyle").value="solid"; }
      if(!t.style.borderColor) t.style.borderColor=$("#cBorder").value; } });
  $("#opacity").oninput=(e)=>applyStyle(t=>t.style.opacity=(+e.target.value/100));
  $("#elW").oninput=(e)=>applyStyle(t=>t.style.width=(+e.target.value||0)+"px");
  $("#elH").oninput=(e)=>applyStyle(t=>t.style.height=(+e.target.value||0)+"px");
  const setRot=(v)=>applyStyle(t=>{ const tf=getTransform(t); tf.rot=+v||0; setTransform(t,tf); });
  $("#rotRange").oninput=(e)=>{ $("#rotNum").value=e.target.value; setRot(e.target.value); };
  $("#rotNum").oninput  =(e)=>{ $("#rotRange").value=e.target.value; setRot(e.target.value); };
  $("#posX").oninput=(e)=>applyStyle(t=>{ const tf=getTransform(t); tf.tx=+e.target.value||0; setTransform(t,tf); });
  $("#posY").oninput=(e)=>applyStyle(t=>{ const tf=getTransform(t); tf.ty=+e.target.value||0; setTransform(t,tf); });
  document.querySelectorAll("#alignSeg [data-a]").forEach(b=>b.onclick=()=>{
    applyStyle(t=>t.style.textAlign=b.dataset.a);
    document.querySelectorAll("#alignSeg [data-a]").forEach(x=>x.classList.toggle("on",x===b));
    pushHistory();
  });
  $("#italicBtn").onclick=()=>{ applyStyle(t=>{
    const it=cstyle(t).fontStyle==="italic"; t.style.fontStyle=it?"normal":"italic"; $("#italicBtn").classList.toggle("on",!it);
  }); pushHistory(); };
  $("#resetTfBtn").onclick=()=>{ applyStyle(t=>{ t.style.removeProperty("transform");
    $("#rotRange").value=0; $("#rotNum").value=0; $("#posX").value=0; $("#posY").value=0; }); pushHistory(); };
  $("#inspBody").addEventListener("change", ()=>pushHistory());
  $("#deleteBtn").onclick=()=>{ if(!selected) return; const el=selected; deselect(); el.remove(); fitHeight(); applyZoom(); commit(); };
}

/* ------------------------------------------------------------ move (in iframe) */
let mvDragging=false, dragMoved=false;
function startMove(e){
  const el=e.target;
  if(!el||!el.hasAttribute||!el.hasAttribute("data-ve-uid")) return;
  if(el.getAttribute("contenteditable")==="true") return;
  select(el); selected=el; mvDragging=true; dragMoved=false;
  const base=getTransform(el), sx=e.clientX, sy=e.clientY;
  e.preventDefault();
  const move=(ev)=>{
    if(!mvDragging) return;
    const dx=ev.clientX-sx, dy=ev.clientY-sy;          // iframe css px (unaffected by parent scale)
    if(Math.abs(dx)+Math.abs(dy)>2) dragMoved=true;
    const tf=getTransform(el); tf.tx=base.tx+dx; tf.ty=base.ty+dy; setTransform(el,tf);
    $("#posX").value=Math.round(tf.tx); $("#posY").value=Math.round(tf.ty);
    positionOverlay();
  };
  const up=()=>{ mvDragging=false; doc.removeEventListener("pointermove",move,true);
    doc.removeEventListener("pointerup",up,true); if(dragMoved){ fitHeight(); applyZoom(); commit(); } };
  doc.addEventListener("pointermove",move,true);
  doc.addEventListener("pointerup",up,true);
}

/* ------------------------------------------------------------ resize + rotate (in parent) */
overlay.querySelector(".grip").addEventListener("pointerdown", startResize);
overlay.querySelector(".rot").addEventListener("pointerdown", startRotate);
function startResize(e){
  if(!selected) return; e.preventDefault(); e.stopPropagation();
  const r=selected.getBoundingClientRect();                     // iframe css px
  const s={x:e.clientX, y:e.clientY, w:r.width, h:r.height, ratio:r.height?r.width/r.height:1};
  const move=(ev)=>{
    const dx=(ev.clientX-s.x)/zoom, dy=(ev.clientY-s.y)/zoom;    // -> css px
    let w=Math.max(8, s.w+dx), h=Math.max(8, s.h+dy);
    if($("#lockAspect").checked) h=w/s.ratio;
    selected.style.width=Math.round(w)+"px"; selected.style.height=Math.round(h)+"px";
    $("#elW").value=Math.round(w); $("#elH").value=Math.round(h);
    fitHeight(); applyZoom();
  };
  const up=()=>{ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); commit(); };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
}
function startRotate(e){
  if(!selected) return; e.preventDefault(); e.stopPropagation();
  const base=getTransform(selected).rot;
  const center=()=>{ const o=overlay.getBoundingClientRect(); return {x:o.left+o.width/2, y:o.top+o.height/2}; };
  const c0=center(), a0=Math.atan2(e.clientY-c0.y, e.clientX-c0.x);
  const move=(ev)=>{
    const c=center(), a=Math.atan2(ev.clientY-c.y, ev.clientX-c.x);
    let deg=Math.round(base+(a-a0)*180/Math.PI);
    const tf=getTransform(selected); tf.rot=deg; setTransform(selected,tf);
    $("#rotRange").value=deg; $("#rotNum").value=deg; positionOverlay();
  };
  const up=()=>{ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); commit(); };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
}

/* ------------------------------------------------------------ assets */
function escapeXml(s){ return String(s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function placeholderSVG(label,kind){
  const bg=kind==="video"?"#2a3550":"#e7e9ee", fg=kind==="video"?"#aab8e0":"#7a8395", tc=kind==="video"?"#dfe6ff":"#3b4252";
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='320' height='200'>
    <rect width='100%' height='100%' fill='${bg}'/>
    <rect x='1' y='1' width='318' height='198' fill='none' stroke='${fg}' stroke-dasharray='6 5'/>
    <text x='160' y='92' font-family='monospace' font-size='12' fill='${fg}' text-anchor='middle'>${kind}</text>
    <text x='160' y='116' font-family='monospace' font-size='14' fill='${tc}' text-anchor='middle'>${escapeXml(label)}</text></svg>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}
function kindOf(name,file){ if(file&&file.type) return file.type.startsWith("video")?"video":"image"; return VIDEO_EXT.test(name)?"video":"image"; }
function renderAssets(){
  const list=$("#assetsList");
  if(!assets.length){ list.innerHTML=`<div class="assets-empty">No assets. Add a named slot (e.g. <code>hero.mp4</code>) or drop a file — the code keeps the name, the preview uses the file.</div>`; return; }
  list.innerHTML="";
  assets.forEach((a,i)=>{
    const row=document.createElement("div"); row.className="asset";
    const thumb=(a.url&&a.kind==="image")?`<span class="thumb"><img src="${a.url}" alt=""></span>`:`<span class="thumb">${a.kind==="video"?"▶":"🖼"}</span>`;
    row.innerHTML=`${thumb}<input class="aname" value="${escapeXml(a.name)}" /><button class="btn ghost sm ins">Insert</button><button class="rm" title="Remove">×</button>`;
    row.querySelector(".aname").onchange=(e)=>renameAsset(i,e.target.value.trim());
    row.querySelector(".ins").onclick=()=>ensureDoc(()=>insertAsset(a,null));
    row.querySelector(".rm").onclick=()=>{ if(a.url) URL.revokeObjectURL(a.url); assets.splice(i,1); renderAssets(); };
    list.appendChild(row);
  });
}
function addAssetSlot(name,file){
  name=(name||"").trim(); if(!name) return null;
  const existing=assets.find(a=>a.name===name);
  if(existing){ if(file){ if(existing.url) URL.revokeObjectURL(existing.url); existing.url=URL.createObjectURL(file); existing.kind=kindOf(name,file); } renderAssets(); return existing; }
  const a={ name, kind:kindOf(name,file), url:file?URL.createObjectURL(file):null };
  assets.push(a); renderAssets(); return a;
}
function renameAsset(i,newName){
  const a=assets[i]; if(!a||!newName||newName===a.name){ renderAssets(); return; }
  const old=a.name; a.name=newName;
  if(doc) doc.querySelectorAll(`[data-ve-src="${cssEsc(old)}"]`).forEach(el=>el.setAttribute("data-ve-src",newName));
  renderAssets(); commit();
}
function cssEsc(s){ return String(s).replace(/["\\]/g,"\\$&"); }
function insertAsset(a,container){
  const isVideo=a.kind==="video";
  const el=doc.createElement(isVideo?"video":"img");
  if(isVideo) el.setAttribute("controls","");
  el.setAttribute("data-ve-src",a.name);
  if(a.url) el.src=a.url;
  else if(isVideo){ el.setAttribute("poster",placeholderSVG(a.name,"video")); el.setAttribute("data-ve-injected-poster","1"); el.setAttribute("src",a.name); }
  else el.src=placeholderSVG(a.name,"image");
  if(!isVideo) el.setAttribute("alt",a.name);
  el.style.maxWidth="100%"; el.setAttribute("data-ve-uid",String(++uidSeq));
  const t=container||((selected&&selected!==doc.body&&!VOID.has(selected.tagName.toLowerCase()))?selected:doc.body);
  t.appendChild(el); fitHeight(); applyZoom(); select(el); commit();
}
function rewireAssets(){
  if(!assets.length) return;
  const map={}; assets.forEach(a=>map[a.name]=a);
  doc.querySelectorAll("img[src], video[src], source[src]").forEach(el=>{
    const s=el.getAttribute("src"), a=map[s]; if(!a) return;
    el.setAttribute("data-ve-src",s);
    if(a.url) el.setAttribute("src",a.url);
    else if(el.tagName.toLowerCase()==="img") el.setAttribute("src",placeholderSVG(s,"image"));
    else { el.setAttribute("poster",placeholderSVG(s,"video")); el.setAttribute("data-ve-injected-poster","1"); }
  });
}

/* ------------------------------------------------------------ code out */
function cleanClone(root){
  const c=root.cloneNode(true);
  c.querySelectorAll("[data-ve-src]").forEach(n=>{ n.setAttribute("src",n.getAttribute("data-ve-src")); n.removeAttribute("data-ve-src"); });
  c.querySelectorAll("[data-ve-injected-poster]").forEach(n=>{ n.removeAttribute("poster"); n.removeAttribute("data-ve-injected-poster"); });
  c.querySelectorAll("[data-ve-uid]").forEach(n=>n.removeAttribute("data-ve-uid"));
  c.querySelectorAll("[contenteditable]").forEach(n=>n.removeAttribute("contenteditable"));
  return c;
}
function syncCode(){
  if(!doc) return;
  const raw=isFullDoc?"<!DOCTYPE html>\n"+cleanClone(doc.documentElement).outerHTML:cleanClone(doc.body).innerHTML;
  codeEl.value=formatHTML(raw);
}
function formatHTML(src){
  const out=[]; let indent=0,i=0; const n=src.length;
  const push=(l)=>out.push("  ".repeat(Math.max(indent,0))+l);
  while(i<n){
    if(src[i]==="<"){
      if(src.startsWith("<!--",i)){ const e=src.indexOf("-->",i); const end=e<0?n:e+3; push(src.slice(i,end).trim()); i=end; continue; }
      const gt=src.indexOf(">",i); const end=gt<0?n:gt+1; const tag=src.slice(i,end);
      const m=tag.match(/^<\s*(\/?)\s*([a-zA-Z0-9-]+)/);
      const closing=m&&m[1]==="/"; const name=m?m[2].toLowerCase():"";
      const selfClose=/\/>\s*$/.test(tag)||VOID.has(name);
      if(src.startsWith("<!",i)){ push(tag.trim()); i=end; continue; }
      if(closing){ indent--; push(tag.trim()); i=end; continue; }
      if(VERBATIM.has(name)){
        const re=new RegExp("</\\s*"+name+"\\s*>","i"); const rest=src.slice(end); const mm=rest.match(re);
        const innerEnd=mm?end+mm.index:n; const closeEnd=mm?innerEnd+mm[0].length:n;
        const inner=src.slice(end,innerEnd).replace(/^\n+|\n+$/g,"");
        push(tag.trim()); indent++;
        inner.split("\n").forEach(l=>out.push(l.trim()?"  ".repeat(indent)+l.trim():""));
        indent--; push(src.slice(innerEnd,closeEnd).trim()); i=closeEnd; continue;
      }
      push(tag.trim()); if(!selfClose) indent++; i=end;
    } else {
      const lt=src.indexOf("<",i); const end=lt<0?n:lt;
      const text=src.slice(i,end).replace(/\s+/g," ").trim(); if(text) push(text); i=end;
    }
  }
  return out.join("\n");
}

/* ------------------------------------------------------------ history (undo/redo) */
function resetHistory(){ history=[]; histIndex=-1; pushHistory(); }
function pushHistory(){
  if(!doc) return;
  const snap=doc.body.innerHTML;
  if(histIndex>=0 && history[histIndex]===snap) return;
  history=history.slice(0,histIndex+1);
  history.push(snap);
  if(history.length>150) history.shift();
  histIndex=history.length-1;
  updateUndoButtons();
}
function restoreSnapshot(html){
  if(!doc) return;
  deselect();
  doc.body.innerHTML=html;
  let max=0; doc.body.querySelectorAll("[data-ve-uid]").forEach(n=>{ const v=+n.getAttribute("data-ve-uid")||0; if(v>max) max=v; });
  uidSeq=max;
  fitHeight(); applyZoom(); syncCode();
}
function undo(){ if(histIndex>0){ histIndex--; restoreSnapshot(history[histIndex]); updateUndoButtons(); } }
function redo(){ if(histIndex<history.length-1){ histIndex++; restoreSnapshot(history[histIndex]); updateUndoButtons(); } }
function commit(){ syncCode(); pushHistory(); }
function updateUndoButtons(){
  $("#undoBtn").disabled = histIndex<=0;
  $("#redoBtn").disabled = histIndex>=history.length-1;
}
$("#undoBtn").onclick=undo;
$("#redoBtn").onclick=redo;

document.addEventListener("keydown",(e)=>{
  const inField=/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
  const mod=e.ctrlKey||e.metaKey;
  if(mod && (e.key==="z"||e.key==="Z")){ if(e.target===codeEl||inField) return; e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if(mod && (e.key==="y"||e.key==="Y")){ if(e.target===codeEl||inField) return; e.preventDefault(); redo(); return; }
  if(e.key==="Escape") deselect();
  if((e.key==="Delete"||e.key==="Backspace")&&selected&&!inField&&selected.getAttribute("contenteditable")!=="true"){
    e.preventDefault(); const el=selected; deselect(); el.remove(); fitHeight(); applyZoom(); commit();
  }
});
